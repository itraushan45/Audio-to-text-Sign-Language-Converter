{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Audio To Sign Language{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <header class="top-header">
    <h1>Audio To Sign Language Tool</h1>
  </header>

  <nav>
    <ul id="nav">
      <li><a class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">Home</a></li>
      <li><a class="{% if request.resolver_match.url_name == 'animation' %}active{% endif %}" href="{% url 'animation' %}">Converter</a></li>
      {% if not user.is_authenticated %}
      <li><a class="{% if request.resolver_match.url_name == 'signup' %}active{% endif %}" href="{% url 'signup' %}">Sign Up</a></li>
      <li><a class="{% if request.resolver_match.url_name == 'login' %}active{% endif %}" href="{% url 'login' %}">Log-in</a></li>
      {% else %}
      <li><a href="{% url 'logout' %}">Log-Out</a></li>
      {% endif %}
      <li><a class="{% if request.resolver_match.url_name == 'contact' %}active{% endif %}" href="{% url 'contact' %}">Contact</a></li>
      <li><a class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}" href="{% url 'about' %}">About</a></li>
    </ul>
  </nav>

  <div class="wrapper">
    {% block content %}
    {% endblock %}
  </div>

</body>
</html>
