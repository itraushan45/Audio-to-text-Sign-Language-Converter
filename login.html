{% extends 'base.html' %}

{% block content %}
<div class="glass-card">
	<h1>Log In</h1>
	<form class="site-form form-style" action="." method="post">
		{% csrf_token %}
		{{ form }}
		{% if request.GET.next %}
			<input type="hidden" name="next" value="{{ request.GET.next }}">
		{% endif %}
		<button class="btn-primary" type="submit" style="margin-top: 1rem;">Log In</button>
	</form>
</div>
{% endblock %}
